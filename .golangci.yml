run:
  timeout: 5m

linters:
  enable-all: false
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gofmt

issues:
  exclude-rules:
    # InsecureSkipVerify is intentional in tests and CLI helpers that document it.
    - linters: [gosec]
      text: "G402"
      path: "_test\\.go"
    - linters: [gosec]
      text: "G402"
      path: "cmd/ghostkey/main\\.go"
