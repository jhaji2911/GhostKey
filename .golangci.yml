version: "2"

run:
  timeout: 5m

linters:
  # Use golangci-lint v2's curated default set (govet, errcheck, staticcheck,
  # ineffassign, etc.). This is more maintainable than enumerating linters
  # manually — v2 removed gosimple/unused as standalone linters (both merged
  # into staticcheck) and may rename others in future releases.
  default: standard
  enable:
    - gosec

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    # InsecureSkipVerify is intentional in tests and CLI helpers that document it.
    - linters: [gosec]
      text: "G402"
      path: "_test\\.go"
    - linters: [gosec]
      text: "G402"
      path: "cmd/ghostkey/main\\.go"
